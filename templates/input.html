<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在庫入力</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-3">

    <!-- 店名 -->
    <div class="text-center mb-2">
        <div class="fw-bold display-6 text-primary">
            SUNABACOカフェ
        </div>
    </div>

    <!-- タブ -->
    <div style="display: flex; justify-content: center; 
                border-bottom: 2px solid #cccccc; margin-bottom: 20px;">
        <a href="/" style="
            padding: 10px 20px; 
            text-decoration: none; 
            color: black;
            border-bottom: 3px solid #0d6efd; 
            font-weight: bold;">
            データを入力
        </a>
        
        <a href="/dashboard" style="
            padding: 10px 20px; 
            text-decoration: none;
            color: gray;">
            リストを見る
        </a>
    </div>

    <h1 class="mb-4">在庫入力</h1>
    {% if message %}
    <div class="alert alert-success">
        {{ message }}
    </div>
    {% endif %}

    <form method="POST">

        <!-- 材料 -->
        <div class="mb-3" style="display: flex; align-items: center; gap: 10px;">
            <label class="form-label mb-0">材料</label>
            <select name="item" class="form-select" required style="max-width: 200px;">
                <option value="コーヒー豆">コーヒー豆</option>
                <option value="牛乳">牛乳</option>
                <option value="卵">卵</option>
                <option value="生クリーム">生クリーム</option>
            </select>
        </div>

        <!-- 操作 -->
        <div class="mb-3" style="display: flex; align-items: center; gap: 10px;">
            <label class="form-label mb-0">操作</label>
            <label class="me-3">
                <input type="radio" name="action" value="仕入れ" checked> 仕入れ
            </label>
            <label>
                <input type="radio" name="action" value="廃棄"> 廃棄
            </label>          
        </div>

        <!-- 数量 -->
        <div class="mb-3" style="display: flex; align-items: center; gap: 10px;">
            <label class="form-label mb-0">数量</label>
                <input type="number" name="quantity" class="form-control" required style="width: 120px;">
                <span id="unit">g</span>
            </div>
        </div>

        <!-- 賞味期限 -->
        <div class="mb-3">
            <label class="form-label">賞味期限（任意）</label>
            <div style="margin-left: 2.5em;">
                <input type="date" name="expiry" class="form-control" style="max-width: 200px;">
                <small>※未入力でもOK</small>
            </div>
        </div>

        <!-- ボタン -->
        <div class="mb-3">
            <div style="margin-left: 2.5em;">
                <button type="submit" class="btn btn-primary" style="width: 200px;">登録する</button>
            </div>         
        </div>
    </form>

    <!-- 単位を切り替える簡単なJS -->
    <script>
        const units = {
            "コーヒー豆": "g",
            "牛乳": "本",
            "卵": "個",
            "生クリーム": "ml"
        };

        const select = document.querySelector('select[name="item"]');
        const unitSpan = document.getElementById("unit");

        select.addEventListener("change", function() {
            unitSpan.textContent = units[this.value];
        });
    </script>

</body>
</html>
